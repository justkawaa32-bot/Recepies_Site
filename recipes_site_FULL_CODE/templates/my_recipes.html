<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Мои рецепты</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="/static/js/theme.js"></script>
    <style>
        :root {
            --accent: #ff7043;
            --accent2: #f06232;
            --bg: #f4f4f4;
            --bg2: #fff4f0;
            --text: #222;
            --muted: #666;
            --card: #ffffff;
            --border: #e5e5e5;
            --shadow: 0 10px 26px rgba(0,0,0,0.10);
        }
        html[data-theme="dark"] {
            --bg: #0f1115;
            --bg2: #121522;
            --text: #e7e9ee;
            --muted: #a7acb9;
            --card: #151925;
            --border: rgba(255,255,255,0.12);
            --shadow: 0 14px 34px rgba(0,0,0,0.55);
        }
        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            background: linear-gradient(180deg, var(--bg2) 0%, var(--bg) 40%, var(--bg) 100%);
            color: var(--text);
        }
        .header {
            background: var(--accent);
            color: white;
            padding: 12px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .site-link { color: white; text-decoration: none; font-weight: 700; }
        .menu-button {
            background: rgba(255,255,255,0.2);
            border: none; border-radius: 999px; width: 36px; height: 36px;
            display: inline-flex; align-items: center; justify-content: center; color: white; cursor: pointer;
        }
        .menu-button svg { width: 20px; height: 20px; fill: none; stroke: currentColor; stroke-width: 2; }
        .container { max-width: 900px; margin: 20px auto; padding: 0 10px; }
        .recipes-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 16px; }
        .top-actions { margin-bottom: 10px; }
        .add-btn {
            display: inline-block;
            background: var(--accent);
            color: #fff;
            text-decoration: none;
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 14px;
        }
        .add-btn:hover { background: var(--accent2); }
        .recipe-card {
            display: block; background: var(--card); border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.08);
            color: inherit; text-decoration: none; overflow: hidden;
        }
        .skeleton-card {
            background: var(--card);
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.08);
            overflow: hidden;
        }
        .skeleton-shimmer {
            position: relative;
            overflow: hidden;
            background: rgba(127,127,127,0.14);
        }
        .skeleton-shimmer::after {
            content: "";
            position: absolute;
            inset: 0;
            transform: translateX(-100%);
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.35), transparent);
            animation: skeletonShift 1.2s infinite;
        }
        .skeleton-img { height: 160px; }
        .skeleton-content { padding: 12px 14px 14px; }
        .skeleton-line { height: 12px; border-radius: 8px; margin-bottom: 8px; }
        .skeleton-line.title { height: 18px; width: 70%; }
        .skeleton-line.meta { width: 45%; }
        .skeleton-badges { display: flex; gap: 6px; margin-top: 6px; }
        .skeleton-badge { width: 66px; height: 20px; border-radius: 999px; }
        .fade-in-list { animation: contentFadeIn .25s ease both; }
        .recipe-card img { width: 100%; height: 160px; object-fit: cover; display: block; }
        .content { padding: 12px 14px 14px; }
        .content h3 { margin: 0 0 8px; font-size: 18px; }
        .meta { color: var(--muted); font-size: 13px; margin-bottom: 8px; }
        .badges { display: flex; flex-wrap: wrap; gap: 6px; }
        .badge { font-size: 12px; background: #ffe0d6; color: #9a3b1f; padding: 4px 8px; border-radius: 999px; }
        .menu-panel {
            position: fixed; top: 0; right: -320px; width: 300px; height: 100%;
            background: var(--card); box-shadow: -6px 0 16px rgba(0,0,0,0.18); transition: right .2s ease;
            z-index: 1001; padding: 16px; box-sizing: border-box;
        }
        .menu-panel.open { right: 0; }
        .menu-backdrop {
            position: fixed; inset: 0; background: rgba(0,0,0,.35); opacity: 0; pointer-events: none;
            transition: opacity .2s ease; z-index: 1000;
        }
        .menu-backdrop.open { opacity: 1; pointer-events: auto; }
        .menu-user {
            display: flex;
            align-items: center;
            gap: 10px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--border);
            margin-bottom: 12px;
            font-size: 14px;
            color: var(--text);
        }
        .menu-icon {
            width: 30px;
            height: 30px;
            border-radius: 999px;
            background: #ffe0d6;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            color: #9a3b1f;
        }
        .menu-icon svg {
            width: 18px;
            height: 18px;
            fill: none;
            stroke: currentColor;
            stroke-width: 2;
        }
        .menu-link {
            display: block;
            width: 100%;
            text-align: left;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 8px 10px;
            margin-bottom: 8px;
            text-decoration: none;
            color: var(--text);
            font-size: 14px;
            cursor: pointer;
        }
        .menu-link:hover { background: rgba(255,112,67,0.10); }
        .menu-theme {
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 10px;
            margin-bottom: 10px;
            background: rgba(255,112,67,0.06);
        }
        .menu-theme-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            font-size: 14px;
            color: var(--text);
        }
        .menu-theme-row input {
            width: 44px;
            height: 24px;
            accent-color: var(--accent);
        }
        @keyframes skeletonShift {
            100% { transform: translateX(100%); }
        }
        @keyframes contentFadeIn {
            from { opacity: 0; transform: translateY(4px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @media (max-width: 520px) { .recipes-grid { grid-template-columns: 1fr; gap: 12px; } }
    </style>
</head>
<body>
<header class="header">
    <a class="site-link" href="/">Кулинарные рецепты</a>
    <button id="menuButton" class="menu-button" type="button" aria-label="Меню">
        <svg viewBox="0 0 24 24" aria-hidden="true">
            <circle cx="12" cy="8" r="4"></circle>
            <path d="M4 20c0-4 4-6 8-6s8 2 8 6"></path>
        </svg>
    </button>
</header>

<div class="container">
    <h2>Мои рецепты</h2>
    <div class="top-actions">
        <a class="add-btn" href="/add">+ Добавить рецепт</a>
    </div>
    <div id="myRecipes" class="recipes-grid">Загрузка...</div>
</div>

<div id="menuBackdrop" class="menu-backdrop"></div>
<aside id="menuPanel" class="menu-panel" aria-label="Меню">
    <div id="menuContent"></div>
</aside>

<script src="/static/js/my_recipes.js"></script>
<script src="/static/js/menu.js"></script>
</body>
</html>
