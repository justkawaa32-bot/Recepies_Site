<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Админка: пользователи</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="/static/js/theme.js"></script>
    <style>
        :root {
            --accent: #ff7043;
            --accent2: #f06232;
            --bg: #f4f4f4;
            --bg2: #fff4f0;
            --text: #222;
            --muted: #666;
            --card: #ffffff;
            --border: #e5e5e5;
            --field: #ffffff;
        }
        html[data-theme="dark"] {
            --bg: #0f1115;
            --bg2: #121522;
            --text: #e7e9ee;
            --muted: #a7acb9;
            --card: #151925;
            --border: rgba(255,255,255,0.12);
            --field: #0f1320;
        }
        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            background: linear-gradient(180deg, var(--bg2) 0%, var(--bg) 40%, var(--bg) 100%);
            color: var(--text);
        }
        .header {
            background: var(--accent);
            color: white;
            padding: 12px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .site-link {
            color: white;
            text-decoration: none;
            font-weight: 700;
        }
        .menu-button {
            background: rgba(255, 255, 255, 0.2);
            border: none;
            border-radius: 999px;
            width: 36px;
            height: 36px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: white;
        }
        .menu-button svg {
            width: 20px;
            height: 20px;
            fill: none;
            stroke: currentColor;
            stroke-width: 2;
        }
        .menu-panel {
            position: fixed;
            top: 0;
            right: -320px;
            width: 300px;
            height: 100%;
            background: var(--card);
            box-shadow: -6px 0 16px rgba(0,0,0,0.18);
            transition: right 0.2s ease;
            z-index: 1001;
            padding: 16px;
            box-sizing: border-box;
        }
        .menu-panel.open {
            right: 0;
        }
        .menu-backdrop {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.35);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s ease;
            z-index: 1000;
        }
        .menu-backdrop.open {
            opacity: 1;
            pointer-events: auto;
        }
        .menu-user {
            display: flex;
            align-items: center;
            gap: 10px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--border);
            margin-bottom: 12px;
            font-size: 14px;
            color: var(--text);
        }
        .menu-icon {
            width: 30px;
            height: 30px;
            border-radius: 999px;
            background: #ffe0d6;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            color: #9a3b1f;
        }
        .menu-icon svg {
            width: 18px;
            height: 18px;
            fill: none;
            stroke: currentColor;
            stroke-width: 2;
        }
        .menu-link {
            display: block;
            width: 100%;
            text-align: left;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 8px 10px;
            margin-bottom: 8px;
            text-decoration: none;
            color: var(--text);
            font-size: 14px;
            cursor: pointer;
        }
        .menu-link:hover {
            background: rgba(255,112,67,0.10);
        }
        .container {
            max-width: 900px;
            margin: 20px auto;
            padding: 0 10px;
        }
        .card {
            background: var(--card);
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.08);
            padding: 16px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        .table-wrap {
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }
        th, td {
            text-align: left;
            padding: 8px;
            border-bottom: 1px solid var(--border);
            font-size: 14px;
        }
        select {
            padding: 6px;
            border-radius: 6px;
            border: 1px solid var(--border);
            background: var(--field);
            color: var(--text);
        }
        button {
            background: var(--accent);
            color: #fff;
            border: none;
            padding: 6px 10px;
            border-radius: 6px;
            cursor: pointer;
        }
        button:hover {
            background: var(--accent2);
        }
        .msg {
            margin-top: 10px;
            font-size: 13px;
            color: #c0392b;
        }
        @media (max-width: 520px) {
            .header { padding: 10px 14px; }
            .container { margin: 14px auto; }
            .card { padding: 14px; }
            table { min-width: 520px; }
        }
    </style>
</head>
<body>

<header class="header">
    <a class="site-link" href="/">Кулинарные рецепты</a>
    <button id="menuButton" class="menu-button" type="button" aria-label="Меню">
        <svg viewBox="0 0 24 24" aria-hidden="true">
            <circle cx="12" cy="8" r="4"></circle>
            <path d="M4 20c0-4 4-6 8-6s8 2 8 6"></path>
        </svg>
    </button>
</header>

<div class="container">
    <div class="card">
        <h2>Пользователи</h2>
        <div class="table-wrap">
            <table>
                <thead>
                    <tr>
                        <th>Логин</th>
                        <th>Роль</th>
                        <th></th>
                    </tr>
                </thead>
                <tbody id="usersBody">
                    <tr><td colspan="3">Загрузка...</td></tr>
                </tbody>
            </table>
        </div>
        <div id="msg" class="msg"></div>
    </div>
</div>

<div id="menuBackdrop" class="menu-backdrop"></div>
<aside id="menuPanel" class="menu-panel" aria-label="Меню">
    <div id="menuContent"></div>
</aside>

<script src="/static/js/admin_users.js"></script>
<script src="/static/js/menu.js"></script>
</body>
</html>
