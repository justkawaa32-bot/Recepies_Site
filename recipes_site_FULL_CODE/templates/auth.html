<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Авторизация</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body{
            margin:0;
            font-family: Arial, Helvetica, sans-serif;
            background:#f4f4f4;
            display:flex;
            justify-content:center;
            align-items:center;
            min-height:100vh;
        }
        .box{
            background:#fff;
            padding:20px;
            width:100%;
            max-width:420px;
            border-radius:10px;
            box-shadow:0 6px 18px rgba(0,0,0,0.1);
        }
        h2{
            margin-top:0;
            text-align:center;
        }
        input{
            width:100%;
            padding:10px;
            margin:8px 0;
            border-radius:6px;
            border:1px solid #ccc;
            font-size:14px;
        }
        button{
            width:100%;
            padding:10px;
            margin-top:10px;
            border:none;
            border-radius:6px;
            background:#ff7043;
            color:white;
            font-size:15px;
            cursor:pointer;
        }
        button:hover{
            background:#f06232;
        }
        .switch{
            text-align:center;
            margin-top:12px;
            font-size:14px;
        }
        .switch a{
            color:#ff7043;
            cursor:pointer;
            text-decoration:none;
        }
        .msg{
            text-align:center;
            margin-top:10px;
            font-size:14px;
            color:red;
        }
        .back{
            text-align:center;
            margin-top:15px;
        }
        .back a{
            color:#666;
            font-size:13px;
            text-decoration:none;
        }
    </style>
</head>
<body>

<div class="box">
    <h2 id="title">Вход</h2>

    <input id="username" placeholder="Имя пользователя">
    <input id="password" type="password" placeholder="Пароль">

    <button id="actionBtn">Войти</button>

    <div class="switch">
        <span id="switchText">Нет аккаунта?</span>
        <a id="switchLink">Регистрация</a>
    </div>

    <div class="msg" id="msg"></div>

    <div class="back">
        <a href="/">← На главную</a>
    </div>
</div>

<script>
    let mode = 'login'; // login | register

    const title = document.getElementById('title');
    const btn = document.getElementById('actionBtn');
    const msg = document.getElementById('msg');
    const switchText = document.getElementById('switchText');
    const switchLink = document.getElementById('switchLink');

    switchLink.onclick = () => {
        if (mode === 'login') {
            mode = 'register';
            title.textContent = 'Регистрация';
            btn.textContent = 'Зарегистрироваться';
            switchText.textContent = 'Уже есть аккаунт?';
            switchLink.textContent = 'Войти';
            msg.textContent = '';
        } else {
            mode = 'login';
            title.textContent = 'Вход';
            btn.textContent = 'Войти';
            switchText.textContent = 'Нет аккаунта?';
            switchLink.textContent = 'Регистрация';
            msg.textContent = '';
        }
    };

    btn.onclick = async () => {
        msg.textContent = '';
        const username = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value;

        if (!username || !password) {
            msg.textContent = 'Заполните все поля';
            return;
        }

        try {
            const res = await fetch(
                mode === 'login' ? '/api/login' : '/api/register',
                {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify({ username, password })
                }
            );

            const data = await res.json();

            if (!res.ok || data.ok === false) {
                msg.textContent = data.error || 'Неверный логин или пароль';
                return;
            }

            if (mode === 'login') {
                location.href = '/';
            } else {
                msg.style.color = 'green';
                msg.textContent = 'Регистрация успешна, можно войти';
            }

        } catch (e) {
            msg.textContent = 'Ошибка соединения с сервером';
        }
    };
</script>
<script>
    // Проверка: уже вошёл?
    async function checkAuth() {
        try {
            const res = await fetch('/api/whoami', {
                credentials: 'include'
            });
            const data = await res.json();

            if (data.ok) {
                // если пользователь уже авторизован — отправляем на главную
                window.location.href = '/';
            }
        } catch (e) {
            console.log('Ошибка проверки авторизации');
        }
    }

    checkAuth();
</script>

</body>
</html>
